<!DOCTYPE html>
<html>
<head>
    <title>LogLens - Security Log Analyzer</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f5f5f5; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        input, button { padding: 10px; margin: 10px; width: 80%; }
        button { background: #667eea; color: white; border: none; cursor: pointer; }
        button:hover { background: #764ba2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LogLens - Security Log Analyzer</h1>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" name="logfile" required>
            <button type="submit">Upload & Analyze</button>
        </form>
        <button onclick="loadDemo()">Load Demo Log</button>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();
            if (data.job_id) {
                window.location.href = `/status/${data.job_id}`;
            } else {
                alert('Error: ' + data.error);
            }
        };

        async function loadDemo() {
            const response = await fetch('/demo');
            const data = await response.json();
            if (data.job_id) {
                window.location.href = `/status/${data.job_id}`;
            } else {
                alert('Error loading demo');
            }
        }
    </script>
</body>
</html>
