<!DOCTYPE html>
<html>
<head>
    <title>Processing Log - LogLens</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f5f5f5; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; }
        .progress { width: 100%; height: 30px; background: #f0f0f0; border-radius: 15px; overflow: hidden; margin: 20px 0; }
        .progress-bar { height: 100%; background: #667eea; width: 0%; transition: width 0.3s; }
        #status { margin: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Processing your log file...</h1>
        <div class="progress">
            <div class="progress-bar" id="progressBar" style="width: {{ progress }}%;"></div>
        </div>
        <p id="status">Processing... {{ progress }}%</p>
        <p id="job">Job ID: {{ job_id }}</p>
    </div>

    <script>
        const jobId = "{{ job_id }}";
        const statusUrl = `/status_json/${jobId}`;
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('status');

        function checkStatus() {
            fetch(statusUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'finished') {
                        window.location.href = `/report/${jobId}`;
                    } else if (data.status === 'failed') {
                        statusText.innerText = 'Error: ' + data.error;
                    } else {
                        const progress = data.progress || 0;
                        progressBar.style.width = progress + '%';
                        statusText.innerText = `Processing... ${progress}%`;
                        setTimeout(checkStatus, 2000);
                    }
                })
                .catch(err => {
                    statusText.innerText = 'Error connecting to server';
                });
        }

        window.onload = checkStatus;
    </script>
</body>
</html>
